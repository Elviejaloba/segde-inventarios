name: Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run health and sync monitor
        run: node scripts/monitor/healthcheck.mjs
        env:
          MONITOR_BASE_URL: ${{ secrets.MONITOR_BASE_URL }}
          BRIDGE_API_KEY_MONITOR: ${{ secrets.BRIDGE_API_KEY_MONITOR }}
          MONITOR_MAX_SYNC_HOURS: ${{ vars.MONITOR_MAX_SYNC_HOURS }}
          MONITOR_CHECK_SYNC: ${{ vars.MONITOR_CHECK_SYNC }}

  open_or_update_alert_issue:
    if: failure()
    needs: monitor
    runs-on: ubuntu-latest
    steps:
      - name: Open or update monitor alert issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "Monitor Alert: healthcheck failed";
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const bodyLine = `Failure detected at ${new Date().toISOString()} in run ${runUrl}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: bodyLine,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: `${bodyLine}\n\nReview monitor workflow logs and restore service/sync.`,
              });
            }

  close_alert_issue_on_recovery:
    if: success()
    needs: monitor
    runs-on: ubuntu-latest
    steps:
      - name: Close open monitor alert issue if exists
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "Monitor Alert: healthcheck failed";
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const existing = issues.find((i) => i.title === title);
            if (!existing) return;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: existing.number,
              body: `Recovered at ${new Date().toISOString()} in run ${runUrl}`,
            });

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: existing.number,
              state: "closed",
            });
